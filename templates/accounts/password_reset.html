{% extends 'base.html' %}
{% load widget_tweaks %}

{% block navbar %}
<style>nav, .navbar { display: none !important; }</style>
{% endblock navbar %}

{% block content %}
<div class="registration-container d-flex align-items-center justify-content-center">
    <div class="login-wrapper animate__animated animate__fadeIn">
        
        <div class="text-center mb-4">
            <div class="brand-logo-circle mb-3 mx-auto shadow-lg">
                <i class="fa fa-envelope-open-text fa-2x text-primary"></i>
            </div>
            <h3 class="fw-bold text-white mb-0">Reset Password</h3>
            <p class="text-white-50">Locked out? Enter your email to receive a recovery link.</p>
        </div>

        <div class="card glass-form rounded-5 border-0 shadow-lg">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-floating custom-form-group mb-4">
                        <input type="email" name="email" class="form-control" id="id_email" placeholder="Email" required>
                        <label for="id_email"><i class="fa fa-at me-2 opacity-50"></i>Email Address</label>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold text-uppercase shadow-lg hover-up" type="submit">
                        Send Reset Link <i class="fa fa-paper-plane ms-2"></i>
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <a href="{% url 'login' %}" class="text-white-50 small text-decoration-none">
                        <i class="fa fa-chevron-left me-1"></i> Return to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Ensure the background matches your luxury theme */
    body {
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                    url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1600&q=80') !important;
        background-size: cover !important;
        background-position: center !important;
    }

    .glass-form {
        background: rgba(25, 25, 25, 0.45) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .custom-form-group .form-control {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff !important;
    }

    .custom-form-group .form-control:focus {
        border-color: #c5a059 !important;
        box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
    }
</style>
{% endblock content %}
