{% extends 'base.html' %}

{% block navbar %}
<style>nav, .navbar { display: none !important; }</style>
{% endblock navbar %}

{% block content %}
<div class="registration-container d-flex align-items-center justify-content-center text-center text-white">
    <div class="login-wrapper animate__animated animate__bounceIn">
        <div class="brand-logo-circle mb-4 mx-auto bg-success border-0 shadow-lg">
            <i class="fa fa-check fa-2x text-white"></i>
        </div>
        <h2 class="fw-bold">Password Reset Complete!</h2>
        <p class="text-white-50 mb-4">Your new password has been set successfully. You can now use your new credentials to log in to the Enny Hotel system.</p>
        
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-lg">
            LOG IN NOW <i class="fa fa-sign-in-alt ms-2"></i>
        </a>
    </div>
</div>
{% endblock content %}
